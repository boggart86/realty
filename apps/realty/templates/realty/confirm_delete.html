{% extends 'base.html' %}
{% block title %}Удалить объект{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="form-card text-center">
      <div class="mb-3" style="font-size:3rem;">🗑️</div>
      <h2 class="mb-2">Удалить объект?</h2>
      <p class="text-muted mb-4">
        Вы уверены, что хотите удалить <strong>«{{ realty.title }}»</strong>?
        Это действие необратимо.
      </p>
      <form method="post" class="d-flex gap-3 justify-content-center">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger px-4">
          <i class="bi bi-trash"></i> Да, удалить
        </button>
        <a href="{% url 'realty:detail' realty.pk %}" class="btn btn-outline-secondary px-4">Отмена</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
